 울렸다.",basement:"테이프는 아직 일어나지 않은 내 비명을 먼저 재생했다. 녹음된 시간은 지금으로부터 삼 분 뒤였다.","cctv-store":"CCTV 속 나는 계산대 앞에 서 있었지만, 실제 나는 냉장고 앞에 있었다. 화면 속 내가 먼저 고개를 돌렸다.","empty-chat":"나간 채팅방의 알림음은 휴대폰이 아니라 옷장 안에서 울렸다. 문틈 아래로 화면 빛이 새어 나왔다.",taxi:"미터기 옆 두 번째 요금은 내 심장박자와 같이 올라갔다. 기사님은 끝까지 내 옆자리에 대고 대답했다.",room404:"복도 끝 404호 문 밑으로 내 방 조명이 새어 나왔다. 없는 방은 점점 내 방 냄새를 닮아 갔다.","game-room":"게임 속 캐릭터가 멈출 때마다 현실의 내 숨도 같이 끊겼다. 마우스를 놓아도 커서는 혼자 침대 쪽으로 움직였다.",delivery:"배달 지도 핀은 현관 앞이 아니라 내 침대 위에서 조금씩 움직였다. 도착 예정 시간은 이미 지나 있었다.","bike-bell":"아기 모니터 화면 귀퉁이에 내 어릴 적 이름표가 보였다. 울음소리는 점점 내 목소리와 비슷해졌다.","wall-knock":"벽 안쪽에서는 내 노크보다 먼저 답이 돌아왔다. 누군가는 내가 두드릴 횟수를 미리 알고 있었다.","ai-speaker":"스피커는 내 목소리로 친구에게 도움을 거절하고 있었다. 전원선은 이미 뽑혀 있었는데도 파란 불은 켜져 있었다.","school-bell":"출석부 마지막 줄에는 오늘 날짜와 내 사망 시간이 적혀 있었다. 방송실은 잠겨 있었지만 내 이름은 계속 불렸다.",lockscreen:"라이브 포토 속의 나는 화면 밖의 나를 손가락으로 가리켰다. 사진 안의 방은 현실보다 몇 초 빠르게 움직였다."}[story.id]||`표시 ${mark}는 방 안에서 조금씩 가까워졌다.`,ending={"midnight-call":"전화를 끊자 휴대폰은 이미 친구에게 전화를 걸고 있었다. 발신지는 내 번호였고, 수신지는 내 등 뒤였다.",elevator:"문이 열렸을 때 그곳은 13층이 아니었다. 엘리베이터는 내 방 한가운데 멈춰 있었고, 침대 위에는 방금 전까지의 내가 누워 있었다.",mirror:"거울 속 빈자리로 내가 들어간 순간, 현실의 방은 조용해졌다. 이제 거울 밖에서 웃고 있는 쪽이 진짜 나인지 알 수 없었다.",forest:"출구 표지판은 처음 봤던 그 나무에 박혀 있었다. 숲은 길을 잃게 만든 것이 아니라, 나를 처음부터 외우고 있었다.",doll:"천을 덮자 인형은 사라졌다. 대신 침대 밑에서 내 목소리를 흉내 내는 자장가가 아주 작게 시작됐다.","old-photo":"빈 의자는 마침내 채워졌다. 사진 밖에 남은 가족들은 내 이름을 기억하지 못했고, 사진 속 나는 그들을 바라보고 있었다.","bus-stop":"다음 정류장 안내가 내 이름을 불렀다. 문이 열리고 내가 내리자, 버스 안 모든 얼굴이 한꺼번에 나로 바뀌었다.","rain-window":"창문 밖의 손은 끝내 들어오지 않았다. 이미 방 안의 손이 유리에 기대어, 다음 문장을 안쪽에서 쓰고 있었다.",basement:"녹음기는 꺼졌지만 빨간 불은 내 목 안에서 켜졌다. 다음 사람이 듣게 될 목소리는 이제 내가 남기게 된다.","cctv-store":"계산 완료 알림과 함께 자동문이 열렸다. 밖으로 걸어 나간 것은 화면 속의 나였고, 실제 나는 계산대 모니터 안에 남았다.","empty-chat":"초대장을 누르자 친구의 이름이 사라졌다. 채팅방 참가자는 나, 또 다른 나, 그리고 아직 말하지 않은 나만 남았다.",taxi:"장례식장 앞에서 기사님은 조용히 말했다. 손님은 이미 내렸습니다. 당신은 뒷좌석에 남은 물건입니다.",room404:"문패가 404호로 바뀐 순간 복도는 사라졌다. 없는 방은 존재하지 않는 것이 아니라, 들어온 사람만 지워 버리는 방이었다.","game-room":"저장 완료 뒤 모니터가 꺼졌다. 검은 화면에 남은 저장 파일 이름은 내 주민번호였고, 삭제 버튼은 보이지 않았다.",delivery:"상자는 비어 있었다. 하지만 초인종은 다시 울렸고, 이번 배송지는 현관도 안방도 아닌 내 몸 안쪽으로 찍혀 있었다.","bike-bell":"카메라가 돌아본 곳에는 아무도 없었다. 그런데 화면 속의 나는 무언가를 안고 있었고, 그것은 내 이름을 엄마라고 불렀다.","wall-knock":"벽지가 찢어진 곳은 옆집이 아니었다. 방 안쪽 벽 뒤에 또 다른 내 방이 있었고, 그 안의 나는 이미 문을 열고 있었다.","ai-speaker":"전원을 뽑아도 스피커는 마지막으로 물었다. 불 꺼줄까. 대답하기도 전에 내 눈꺼풀이 먼저 꺼졌다.","school-bell":"칠판의 결석 표시가 지워졌다. 대신 나는 맨 뒤 빈 책상에 앉아 있었고, 선생님은 출석부에서 내 이름을 두 번 불렀다.",lockscreen:"사진 속 내가 웃자 현실의 입꼬리도 따라 올라갔다. 마지막 사진은 내가 찍은 것이 아니었다. 다음 사진을 찍을 사람도 내가 아니었다."}[story.id]||"처음 본 경고는 경고가 아니었다. 그것은 내가 눌러야만 열리는 초대장이었다.";story.scenes=[{title:a.title,visual:a.visual,fx:a.fx,lines:[["나레이션",`${story.title}. 시작은 별것 아닌 이상한 낌새였다.`],["나레이션",`${story.desc}. 그것은 우연처럼 보였지만, 너무 정확한 시간에 나를 찾아왔다.`],["나레이션",`처음에는 확인만 해 보려 했다. 그러나 화면 한가운데 떠오른 ${mark} 표시가 숨 쉬듯 커졌다 작아졌다.`],["나레이션","그 순간, 나는 이미 돌아갈 수 없는 쪽으로 한 걸음 들어가 있었다."]]},{title:"가까워지는 기척",visual:midVisual,fx:"flicker",lines:[["나레이션","방 안의 소리는 하나씩 사라지고, 대신 내가 낸 적 없는 작은 기척들이 가까워졌다."],["나레이션",detail],["나레이션",`이상한 것은 ${mark} 표시를 읽을 때마다 공포가 커지는 게 아니라, 그것이 내 반응을 기다리는 것처럼 보였다는 점이다.`],["나레이션","내 그림자는 내 움직임보다 먼저 문 쪽으로 흘러갔고, 공기는 누군가의 숨처럼 차갑게 목덜미에 닿았다."],["나레이션","그때 나는 알았다. 나는 무언가를 보고 있는 것이 아니라, 무언가에게 확인당하고 있었다."]]},{title:b.title,visual:b.visual,fx:"jump",lines:[["나레이션","마지막 장면은 늘 가장 조용하게 시작된다. 그래서 더 늦게 알아차린다."],["나레이션",`${b.title}. 그 말이 머릿속에 떠오른 순간, 처음의 낌새들이 하나의 결론으로 이어졌다.`],["나레이션","초반에 도착한 것은 경고가 아니었다. 그것은 내가 스스로 열어야 완성되는 초대장이었다."],["나레이션",ending]]}]}stories.forEach(condenseStory);function frame(sc,story){return `<div class="scene"><div class="wall"></div><div class="floor"></div><div class="shadow"></div><div class="object ${esc(sc.visual)}">${esc(symbol(story.id))}</div><div class="label">${esc(sc.title)}</div></div>`}function ensureAudio(){if(audioCtx)return;audioCtx=new (window.AudioContext||window.webkitAudioContext)();master=audioCtx.createGain();master.gain.value=soundOn?.45:0;master.connect(audioCtx.destination)}function startHomeBgm(){ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume().catch(()=>{});if(!drone.length)startDrone(currentStory.bpm)}function tone(f,d=.2,v=.1,type="sine",w=0){if(!audioCtx||!soundOn)return;const t=audioCtx.currentTime+w,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(v,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g).connect(master);o.start(t);o.stop(t+d+.05)}function noise(d=.25,v=.08,ff=900){if(!audioCtx||!soundOn)return;const size=Math.floor(audioCtx.sampleRate*d),buf=audioCtx.createBuffer(1,size,audioCtx.sampleRate),data=buf.getChannelData(0);for(let i=0;i<size;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/size,1.6);const src=audioCtx.createBufferSource(),f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();src.buffer=buf;f.type="bandpass";f.frequency.value=ff;f.Q.value=8;g.gain.value=v;src.connect(f).connect(g).connect(master);src.start()}function startDrone(bpm){stopDrone();if(!audioCtx)return;[["sine",43,.12],["sawtooth",65,.032],["triangle",31,.045]].forEach(a=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=a[0];o.frequency.value=a[1];g.gain.value=a[2];o.connect(g).connect(master);o.start();drone.push(o,g)});const beat=Math.max(560,Math.floor(60000/bpm));const h=setInterval(()=>{if(running&&soundOn){tone(78,.12,.12);setTimeout(()=>tone(57,.09,.09),150)}},beat*2);drone.push({stop:()=>clearInterval(h)})}function stopDrone(){drone.forEach(n=>{try{n.stop&&n.stop()}catch(e){}try{n.disconnect&&n.disconnect()}catch(e){}});drone=[]}function jumpscare(word="뒤에"){jump.textContent=word;flash.classList.remove("on");void flash.offsetWidth;flash.classList.add("on");jump.classList.remove("show");void jump.offsetWidth;jump.classList.add("show");document.body.classList.remove("shake");void document.body.offsetWidth;document.body.classList.add("shake");tone(45,.85,.28,"sawtooth");tone(900,.2,.15,"square");noise(.48,.2,1500)}function playFx(name){({whisper(){noise(.75,.07,1800);tone(310,.55,.025,"triangle")},breath(){noise(1.2,.07,420);tone(52,.7,.045,"sawtooth")},metal(){tone(122,.55,.16,"square");noise(.32,.1,1200)},flicker(){for(let i=0;i<7;i++)setTimeout(()=>tone(80+i*33,.06,.09,"square"),i*82);noise(.55,.05,2400)},wind(){noise(1.2,.06,280)},box(){noise(.45,.1,650);tone(73,.35,.06)},camera(){noise(.08,.16,1800);tone(130,.08,.07,"square")},engine(){tone(48,.85,.11,"sawtooth");noise(.45,.055,180)},tap(){tone(380,.05,.08);setTimeout(()=>tone(340,.05,.075),190)},rain(){noise(1.2,.055,2200)},tape(){noise(1.1,.085,700);tone(120,.55,.04,"sawtooth")},knock(){for(let i=0;i<4;i++)setTimeout(()=>tone(86,.09,.12),i*210)},jump(){jumpscare(["뒤에","봤지?","열지 마"][Math.floor(Math.random()*3)])}}[name]||function(){noise(.75,.07,1800)})()}function addBubble(sp,text){const b=document.createElement("div"),cls=sp==="나레이션"?"narrator":(sp==="나"?"me":(sp==="???"?"unknown":"friend"));b.className="bubble "+cls;b.innerHTML=sp==="나레이션"?esc(text):`<span class="name">${esc(sp)}</span>${esc(text)}`;chatBox.appendChild(b);chatBox.scrollTop=chatBox.scrollHeight}function lineMs(t){return Math.max(4200,Math.min(7600,2600+String(t).length*34))}function buildTimeline(s){const events=[];let at=0;s.scenes.forEach((sc,i)=>{events.push({at,type:"scene",sc,i});at+=900;sc.lines.forEach((line,j)=>{events.push({at,type:"line",line});if(sc.fx==="jump"&&j===sc.lines.length-1)events.push({at:at+1100,type:"scare",word:symbol(s.id)});at+=lineMs(line[1])+380});at+=700});events.push({at,type:"end"});return events}function storyDuration(s){const tl=buildTimeline(s);return tl[tl.length-1].at}function clearPlaybackTimers(){timers.forEach(clearTimeout);timers=[];if(tick)clearInterval(tick);tick=null}function renderScene(s,sc,i){photo.innerHTML=frame(sc,s);sceneTitle.textContent=sc.title;storyTitle.textContent=s.title;now.textContent=`재생 중 · ${s.title}`;sceneCount.textContent=`장면 ${i+1} / ${s.scenes.length}`;playFx(sc.fx)}function runEvent(e,t){if(t!==token)return;if(e.type==="scene")renderScene(currentStory,e.sc,e.i);else if(e.type==="line")addBubble(e.line[0],e.line[1]);else if(e.type==="scare")jumpscare(e.word);else if(e.type==="end")finishPlayback()}function scheduleFrom(t){clearPlaybackTimers();activeTimeline=buildTimeline(currentStory);activeTimeline.forEach(e=>{const wait=e.at-elapsedBeforePause;if(wait>=0){const id=setTimeout(()=>runEvent(e,t),wait);timers.push(id)}});tick=setInterval(updateProgress,100)}function finishPlayback(){clearPlaybackTimers();running=false;paused=false;document.body.classList.remove("paused");elapsedBeforePause=totalDur;playBtn.textContent="다시 재생";stopDrone();updateProgress(true);now.textContent="재생 완료"}function previewStory(s){resetPlayback(false);const first=s.scenes[0];photo.innerHTML=frame(first,s);sceneTitle.textContent=first.title;storyTitle.textContent=s.title;chatBox.innerHTML="";first.lines.forEach(l=>addBubble(l[0],l[1]));now.textContent="미리보기";sceneCount.textContent=`장면 1 / ${s.scenes.length}`;totalDur=storyDuration(s);timeText.textContent=`00:00 / ${fmt(totalDur)}`;bar.style.width="0%"}function startPlayback(reset=true){if(reset){elapsedBeforePause=0;chatBox.innerHTML=""}ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume();currentStory=stories[selectedStoryIndex];totalDur=storyDuration(currentStory);running=true;paused=false;document.body.classList.remove("paused");token++;startedAt=performance.now()-elapsedBeforePause;playBtn.textContent="일시정지";startDrone(currentStory.bpm);scheduleFrom(token);updateProgress()}function pausePlayback(){if(!running)return;elapsedBeforePause=Math.min(totalDur,performance.now()-startedAt);token++;clearPlaybackTimers();stopDrone();running=false;paused=true;document.body.classList.add("paused");playBtn.textContent="계속 재생";now.textContent=`일시정지 · ${fmt(elapsedBeforePause)}`;updateProgress()}function resumePlayback(){if(!paused||elapsedBeforePause>=totalDur){startPlayback(true);return}ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume();running=true;paused=false;document.body.classList.remove("paused");token++;startedAt=performance.now()-elapsedBeforePause;playBtn.textContent="일시정지";now.textContent=`재생 중 · ${currentStory.title}`;startDrone(currentStory.bpm);scheduleFrom(token);updateProgress()}function updateProgress(done=false){const e=done?totalDur:(running?performance.now()-startedAt:elapsedBeforePause),pct=totalDur?Math.min(100,e/totalDur*100):0;bar.style.width=pct+"%";timeText.textContent=`${fmt(e)} / ${fmt(totalDur)}`}function resetPlayback(resetUi=true){token++;clearPlaybackTimers();stopDrone();running=false;paused=false;document.body.classList.remove("paused");elapsedBeforePause=0;playBtn.textContent="재생";if(resetUi){now.textContent="멈춤";bar.style.width="0%";timeText.textContent=`00:00 / ${fmt(totalDur||0)}`}}function chooseStory(i){selectedStoryIndex=i;currentStory=stories[i];previewStory(currentStory);location.hash=`player-${i}`;showPage(playerPage)}stories.forEach((s,i)=>{const btn=document.createElement("button");btn.className="card";btn.type="button";btn.innerHTML=`<strong>${i+1}. ${esc(s.title)}</strong><span>${esc(s.desc)}</span>`;btn.onclick=()=>chooseStory(i);themeGrid.appendChild(btn)});$("themeCount").textContent=`공포 주제 ${stories.length}개`;function route(){const h=location.hash.replace("#","");if(h==="themes"){showPage(themePage);return}if(h.startsWith("player-")){const i=Number(h.split("-")[1]);selectedStoryIndex=Number.isFinite(i)&&stories[i]?i:0;currentStory=stories[selectedStoryIndex];previewStory(currentStory);showPage(playerPage);return}showPage(homePage)}window.addEventListener("hashchange",route);$("homeStartBtn").onclick=()=>{location.hash="themes";showPage(themePage)};$("homeBackBtn").onclick=()=>{resetPlayback(true);location.hash="";showPage(homePage)};$("themeBackBtn").onclick=()=>{resetPlayback(true);location.hash="themes";showPage(themePage)};playBtn.onclick=()=>running?pausePlayback():(paused?resumePlayback():startPlayback(true));soundBtn.onclick=()=>{ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume();soundOn=!soundOn;if(master)master.gain.value=soundOn?.45:0;soundBtn.textContent=soundOn?"소리 켜짐":"소리 꺼짐"};["pointerdown","keydown","touchstart","click"].forEach(ev=>window.addEventListener(ev,startHomeBgm,{once:true,passive:true}));previewStory(currentStory);route();startHomeBgm();
</script>
