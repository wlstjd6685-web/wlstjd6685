<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section class="lotto-panel" aria-labelledby="lotto-title">
            <h1 id="lotto-title">로또 번호 추첨</h1>
            <div id="lotto-numbers" aria-live="polite"></div>
            <button id="generate-btn" type="button">번호 추첨</button>
        </section>

        <section class="contact-panel" aria-labelledby="contact-title">
            <h2 id="contact-title">제휴 문의</h2>
            <form id="partner-form" action="https://formspree.io/f/xlgvlrnn" method="POST">
                <label>
                    이름
                    <input type="text" name="name" autocomplete="name" required>
                </label>
                <label>
                    이메일
                    <input type="email" name="email" autocomplete="email" required>
                </label>
                <label>
                    문의 내용
                    <textarea name="message" rows="5" required></textarea>
                </label>
                <button type="submit">문의 보내기</button>
                <p id="form-status" role="status"></p>
            </form>
        </section>
    </div>

    <section class="comments-panel" aria-label="댓글">
        <div id="disqus_thread"></div>
    </section>

    <script src="main.js"></script>
    <script>
        var disqus_config = function () {
            this.page.url = 'https://wlstjd6685-web.github.io/wlstjd6685/';
            this.page.identifier = 'wlstjd6685-lotto-home';
        };

        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://wlstjddldd.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</body>
</html>
